[project]
site_name = "taskito"
site_description = "Rust-powered task queue for Python. No broker required."
site_url = "https://taskito.grigori.in"
repo_url = "https://github.com/pratyush618/taskito"
repo_name = "pratyush618/taskito"

extra_javascript = ["assets/js/copy-markdown.js"]
extra_css = ["assets/css/custom.css"]

nav = [
    { "Home" = "index.md" },
    { "Getting Started" = [
        { "Installation" = "getting-started/installation.md" },
        { "Quickstart" = "getting-started/quickstart.md" },
    ] },
    { "User Guide" = [
        { "Tasks" = "guide/tasks.md" },
        { "Workers" = "guide/workers.md" },
        { "Queues & Priority" = "guide/queues.md" },
        { "Scheduling" = "guide/scheduling.md" },
        { "Retries & Dead Letters" = "guide/retries.md" },
        { "Rate Limiting" = "guide/rate-limiting.md" },
        { "Circuit Breakers" = "guide/circuit-breakers.md" },
        { "Error Handling" = "guide/error-handling.md" },
        { "Workflows" = "guide/workflows.md" },
        { "Dependencies" = "guide/dependencies.md" },
        { "Distributed Locking" = "guide/locking.md" },
        { "Middleware" = "guide/middleware.md" },
        { "Serializers" = "guide/serializers.md" },
        { "Monitoring & Hooks" = "guide/monitoring.md" },
        { "Structured Logging" = "guide/logging.md" },
        { "Events & Webhooks" = "guide/events-webhooks.md" },
        { "Web Dashboard" = "guide/dashboard.md" },
        { "Native Async Tasks" = "guide/async-tasks.md" },
        { "Testing" = "guide/testing.md" },
        { "Deployment" = "guide/deployment.md" },
        { "KEDA Autoscaling" = "guide/keda.md" },
        { "Postgres Backend" = "guide/postgres.md" },
        { "Migrating from Celery" = "guide/migration.md" },
        { "Advanced" = "guide/advanced.md" },
    ] },
    { "Integrations" = [
        { "Overview" = "integrations/index.md" },
        { "FastAPI" = "integrations/fastapi.md" },
        { "Flask" = "integrations/flask.md" },
        { "Django" = "integrations/django.md" },
        { "OpenTelemetry" = "integrations/otel.md" },
        { "Prometheus" = "integrations/prometheus.md" },
        { "Sentry" = "integrations/sentry.md" },
    ] },
    { "Resource System" = [
        { "Overview" = "resources/index.md" },
        { "Argument Interception" = "resources/interception.md" },
        { "Dependency Injection" = "resources/dependency-injection.md" },
        { "Resource Proxies" = "resources/proxies.md" },
        { "Configuration" = "resources/configuration.md" },
        { "Testing" = "resources/testing.md" },
        { "Observability" = "resources/observability.md" },
    ] },
    { "Architecture" = "architecture.md" },
    { "API Reference" = [
        { "Queue" = "api/queue.md" },
        { "TaskWrapper" = "api/task.md" },
        { "JobResult" = "api/result.md" },
        { "JobContext" = "api/context.md" },
        { "Canvas" = "api/canvas.md" },
        { "Testing" = "api/testing.md" },
        { "CLI" = "api/cli.md" },
    ] },
    { "Examples" = [
        { "FastAPI Service" = "examples/fastapi-service.md" },
        { "Notification Service" = "examples/notifications.md" },
        { "Web Scraper Pipeline" = "examples/web-scraper.md" },
        { "Data Pipeline" = "examples/data-pipeline.md" },
        { "Benchmark" = "examples/benchmark.md" },
    ] },
    { "Comparison" = "comparison.md" },
    { "FAQ" = "faq.md" },
    { "Changelog" = "changelog.md" },
    { "Changelog Archive" = "changelog/archive.md" },
]

[project.theme]
name = "material"
features = [
    "navigation.instant",
    "navigation.tracking",
    "navigation.top",
    "content.code.copy",
    "content.code.annotate",
    "content.tabs.link",
    "search.highlight",
    "search.suggest",
    "toc.follow",
]

[[project.theme.palette]]
scheme = "default"
primary = "deep purple"
accent = "amber"
toggle = { icon = "material/brightness-7", name = "Switch to dark mode" }

[[project.theme.palette]]
scheme = "slate"
primary = "deep purple"
accent = "amber"
toggle = { icon = "material/brightness-4", name = "Switch to light mode" }

[project.theme.font]
text = "Inter"
code = "JetBrains Mono"

[project.theme.icon]
repo = "fontawesome/brands/github"

[project.markdown_extensions]
admonition = {}
"pymdownx.details" = {}
"pymdownx.superfences" = { custom_fences = [
    { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
] }
"pymdownx.tabbed" = { alternate_style = true }
"pymdownx.highlight" = { anchor_linenums = true, line_spans = "__span", pygments_lang_class = true }
"pymdownx.inlinehilite" = {}
"pymdownx.snippets" = {}
"pymdownx.mark" = {}
"pymdownx.keys" = {}
"pymdownx.emoji" = { emoji_index = "zensical.extensions.emoji.twemoji", emoji_generator = "zensical.extensions.emoji.to_svg" }
attr_list = {}
md_in_html = {}
tables = {}
toc = { permalink = true }
def_list = {}
"pymdownx.tasklist" = { custom_checkbox = true }

[project.plugins]
search = {}

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/pratyush618/taskito"

[[project.extra.social]]
icon = "fontawesome/brands/python"
link = "https://pypi.org/project/taskito/"
