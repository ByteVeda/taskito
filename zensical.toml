[project.theme]
name = "material"
features = [
    "navigation.instant",
    "navigation.tracking",
    "navigation.tabs",
    "navigation.sections",
    "navigation.indexes",
    "navigation.path",
    "navigation.prune",
    "navigation.top",
    "content.code.copy",
    "content.code.annotate",
    "content.tabs.link",
    "search.highlight",
    "search.suggest",
    "toc.follow",
]

[[project.theme.palette]]
scheme = "default"
primary = "deep purple"
accent = "amber"
toggle = { icon = "material/brightness-7", name = "Switch to dark mode" }

[[project.theme.palette]]
scheme = "slate"
primary = "deep purple"
accent = "amber"
toggle = { icon = "material/brightness-4", name = "Switch to light mode" }

[project.theme.font]
text = "Inter"
code = "JetBrains Mono"

[project.theme.icon]
repo = "fontawesome/brands/github"

[project.markdown_extensions]
admonition = {}
"pymdownx.details" = {}
"pymdownx.superfences" = { custom_fences = [
    { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
] }
"pymdownx.tabbed" = { alternate_style = true }
"pymdownx.highlight" = { anchor_linenums = true, line_spans = "__span", pygments_lang_class = true }
"pymdownx.inlinehilite" = {}
"pymdownx.snippets" = {}
"pymdownx.mark" = {}
"pymdownx.keys" = {}
"pymdownx.emoji" = { emoji_index = "zensical.extensions.emoji.twemoji", emoji_generator = "zensical.extensions.emoji.to_svg" }
attr_list = {}
md_in_html = {}
tables = {}
toc = { permalink = true }
def_list = {}
"pymdownx.tasklist" = { custom_checkbox = true }

[project.plugins]
search = {}

[project.extra]
generator = false

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/ByteVeda/taskito"

[[project.extra.social]]
icon = "fontawesome/brands/python"
link = "https://pypi.org/project/taskito/"
