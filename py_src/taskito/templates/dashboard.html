<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>taskito dashboard</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --bg2: #16213e;
      --bg3: #0f3460;
      --fg: #e0e0e0;
      --fg2: #a0a0b0;
      --accent: #7c4dff;
      --accent2: #b388ff;
      --green: #66bb6a;
      --yellow: #ffa726;
      --red: #ef5350;
      --blue: #42a5f5;
      --cyan: #26c6da;
      --radius: 8px;
      --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
    }

    a {
      color: var(--accent2);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    /* ── Header ──────────────────────────────── */
    header {
      background: var(--bg2);
      border-bottom: 1px solid var(--bg3);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: var(--accent2);
    }

    header h1 span {
      color: var(--fg2);
      font-weight: 400;
    }

    nav {
      display: flex;
      gap: 16px;
    }

    nav a {
      color: var(--fg2);
      font-size: 14px;
      padding: 4px 8px;
      border-radius: 4px;
      transition: all 0.15s;
    }

    nav a:hover,
    nav a.active {
      color: var(--fg);
      background: var(--bg3);
      text-decoration: none;
    }

    .refresh-ctl {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--fg2);
    }

    .refresh-ctl select {
      background: var(--bg3);
      color: var(--fg);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 12px;
    }

    /* ── Main ────────────────────────────────── */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    /* ── Stats cards ─────────────────────────── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--bg2);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
      text-align: center;
    }

    .stat-card .value {
      font-size: 28px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .stat-card .label {
      font-size: 12px;
      color: var(--fg2);
      text-transform: uppercase;
      margin-top: 4px;
    }

    .stat-card.pending .value {
      color: var(--yellow);
    }

    .stat-card.running .value {
      color: var(--blue);
    }

    .stat-card.completed .value {
      color: var(--green);
    }

    .stat-card.failed .value {
      color: var(--red);
    }

    .stat-card.dead .value {
      color: var(--red);
    }

    .stat-card.cancelled .value {
      color: var(--fg2);
    }

    /* ── Filters ─────────────────────────────── */
    .filters {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filters select,
    .filters input {
      background: var(--bg2);
      color: var(--fg);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      padding: 6px 10px;
      font-size: 13px;
    }

    .filters input {
      width: 180px;
    }

    /* ── Table ───────────────────────────────── */
    .table-wrap {
      background: var(--bg2);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead th {
      text-align: left;
      padding: 10px 12px;
      background: var(--bg3);
      color: var(--fg2);
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    tbody td {
      padding: 8px 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.04);
      white-space: nowrap;
    }

    tbody tr:hover {
      background: rgba(124, 77, 255, 0.06);
    }

    .id-cell {
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 12px;
      max-width: 100px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Status badges ───────────────────────── */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .badge.pending {
      background: rgba(255, 167, 38, 0.15);
      color: var(--yellow);
    }

    .badge.running {
      background: rgba(66, 165, 245, 0.15);
      color: var(--blue);
    }

    .badge.complete {
      background: rgba(102, 187, 106, 0.15);
      color: var(--green);
    }

    .badge.failed {
      background: rgba(239, 83, 80, 0.15);
      color: var(--red);
    }

    .badge.dead {
      background: rgba(239, 83, 80, 0.25);
      color: var(--red);
    }

    .badge.cancelled {
      background: rgba(160, 160, 176, 0.15);
      color: var(--fg2);
    }

    /* ── Progress bar ────────────────────────── */
    .progress-bar {
      width: 60px;
      height: 6px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 3px;
      overflow: hidden;
      display: inline-block;
      vertical-align: middle;
    }

    .progress-bar .fill {
      height: 100%;
      background: var(--accent);
      border-radius: 3px;
      transition: width 0.3s;
    }

    /* ── Pagination ──────────────────────────── */
    .pagination {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      font-size: 13px;
      color: var(--fg2);
    }

    .pagination button {
      background: var(--bg3);
      color: var(--fg);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      padding: 6px 14px;
      cursor: pointer;
      font-size: 13px;
    }

    .pagination button:disabled {
      opacity: 0.4;
      cursor: default;
    }

    .pagination button:hover:not(:disabled) {
      background: var(--accent);
    }

    /* ── Job detail panel ────────────────────── */
    .detail-panel {
      background: var(--bg2);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
    }

    .detail-panel h2 {
      font-size: 16px;
      margin-bottom: 16px;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 8px 16px;
      font-size: 13px;
    }

    .detail-grid .label {
      color: var(--fg2);
    }

    .detail-grid .value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      word-break: break-all;
    }

    .btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 6px 16px;
      cursor: pointer;
      font-size: 13px;
      margin-top: 12px;
    }

    .btn:hover {
      opacity: 0.85;
    }

    .btn.danger {
      background: var(--red);
    }

    /* ── Error list ──────────────────────────── */
    .error-list {
      margin-top: 16px;
    }

    .error-item {
      background: rgba(239, 83, 80, 0.08);
      border-left: 3px solid var(--red);
      padding: 10px 12px;
      margin-bottom: 8px;
      border-radius: 0 4px 4px 0;
      font-size: 13px;
    }

    .error-item .attempt {
      color: var(--fg2);
      font-size: 11px;
    }

    /* ── Empty state ─────────────────────────── */
    .empty {
      text-align: center;
      padding: 48px 0;
      color: var(--fg2);
      font-size: 14px;
    }

    /* ── Throughput ───────────────────────────── */
    .throughput {
      font-size: 12px;
      color: var(--fg2);
      margin-bottom: 16px;
    }

    .throughput span {
      color: var(--green);
      font-weight: 600;
    }

    /* ── Chart ────────────────────────────────── */
    .chart-container {
      background: var(--bg2);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      margin-bottom: 24px;
    }

    .chart-container h3 {
      font-size: 14px;
      color: var(--fg2);
      margin-bottom: 12px;
    }

    .chart-container canvas {
      width: 100%;
      height: 160px;
    }

    /* ── DAG ──────────────────────────────────── */
    .dag-container {
      margin-top: 16px;
    }

    .dag-container svg {
      width: 100%;
      min-height: 120px;
    }

    .dag-node {
      cursor: pointer;
    }

    .dag-node rect {
      rx: 6;
      ry: 6;
    }

    .dag-node text {
      font-size: 11px;
      fill: var(--fg);
    }

    .dag-edge {
      stroke: var(--fg2);
      stroke-width: 1.5;
      fill: none;
      marker-end: url(#arrow);
    }

    /* ── Worker cards ─────────────────────────── */
    .worker-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 12px;
    }

    .worker-card {
      background: var(--bg2);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
    }

    .worker-card .worker-id {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--accent2);
      margin-bottom: 8px;
    }

    .worker-card .worker-meta {
      font-size: 12px;
      color: var(--fg2);
    }

    .worker-card .worker-meta span {
      color: var(--fg);
    }
  </style>
</head>

<body>

  <header>
    <h1>taskito <span>dashboard</span></h1>
    <nav>
      <a href="#/" id="nav-home">Overview</a>
      <a href="#/jobs" id="nav-jobs">Jobs</a>
      <a href="#/metrics" id="nav-metrics">Metrics</a>
      <a href="#/logs" id="nav-logs">Logs</a>
      <a href="#/workers" id="nav-workers">Workers</a>
      <a href="#/circuit-breakers" id="nav-cb">Circuit Breakers</a>
      <a href="#/dead-letters" id="nav-dead">Dead Letters</a>
    </nav>
    <div class="refresh-ctl">
      <label>Refresh:</label>
      <select id="refresh-interval">
        <option value="2000">2s</option>
        <option value="5000" selected>5s</option>
        <option value="10000">10s</option>
        <option value="0">Off</option>
      </select>
    </div>
  </header>

  <main id="app"></main>

  <script>
    // ── State ────────────────────────────────────────────
    const S = {
      stats: {},
      jobs: [],
      deadLetters: [],
      jobDetail: null,
      jobErrors: [],
      filter: { status: '', queue: '', task: '', metadata: '', error: '', created_after: '', created_before: '' },
      page: 0,
      pageSize: 20,
      prevCompleted: 0,
      throughput: 0,
      throughputHistory: [],
      refreshTimer: null,
      refreshMs: 5000,
    };

    const $ = (sel) => document.querySelector(sel);
    const $app = () => $('#app');

    // ── API ──────────────────────────────────────────────
    async function api(path) {
      const res = await fetch(path);
      return res.json();
    }

    async function apiPost(path) {
      const res = await fetch(path, { method: 'POST' });
      return res.json();
    }

    // ── Routing ──────────────────────────────────────────
    function route() {
      const hash = location.hash || '#/';
      // Update nav active state
      document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));

      if (hash === '#/' || hash === '#') {
        $('#nav-home').classList.add('active');
        renderOverview();
      } else if (hash === '#/jobs') {
        $('#nav-jobs').classList.add('active');
        S.page = 0;
        renderJobs();
      } else if (hash.startsWith('#/jobs/')) {
        $('#nav-jobs').classList.add('active');
        const id = hash.slice(7);
        renderJobDetail(id);
      } else if (hash === '#/metrics') {
        $('#nav-metrics').classList.add('active');
        renderMetrics();
      } else if (hash === '#/logs') {
        $('#nav-logs').classList.add('active');
        renderLogs();
      } else if (hash === '#/workers') {
        $('#nav-workers').classList.add('active');
        renderWorkers();
      } else if (hash === '#/circuit-breakers') {
        $('#nav-cb').classList.add('active');
        renderCircuitBreakers();
      } else if (hash === '#/dead-letters') {
        $('#nav-dead').classList.add('active');
        S.page = 0;
        renderDeadLetters();
      } else {
        $('#nav-home').classList.add('active');
        renderOverview();
      }
    }

    // ── Renderers ────────────────────────────────────────

    async function renderOverview() {
      S.stats = await api('/api/stats');

      const completed = S.stats.completed || 0;
      if (S.prevCompleted > 0) {
        S.throughput = ((completed - S.prevCompleted) / (S.refreshMs / 1000)).toFixed(1);
      }
      S.prevCompleted = completed;

      // Track throughput over time (ring buffer of 60 points)
      S.throughputHistory.push(parseFloat(S.throughput) || 0);
      if (S.throughputHistory.length > 60) S.throughputHistory.shift();

      // Also fetch recent jobs
      const recent = await api('/api/jobs?limit=10');

      $app().innerHTML = `
    ${statsHTML(S.stats)}
    <div class="chart-container">
      <h3>Throughput (jobs/s)</h3>
      <canvas id="throughput-chart" height="160"></canvas>
    </div>
    <h3 style="margin-bottom:12px; font-size:14px; color:var(--fg2);">Recent Jobs</h3>
    ${jobTableHTML(recent, false)}
  `;
      drawThroughputChart();
    }

    async function renderJobs() {
      S.stats = await api('/api/stats');

      let url = `/api/jobs?limit=${S.pageSize}&offset=${S.page * S.pageSize}`;
      if (S.filter.status) url += `&status=${S.filter.status}`;
      if (S.filter.queue) url += `&queue=${encodeURIComponent(S.filter.queue)}`;
      if (S.filter.task) url += `&task=${encodeURIComponent(S.filter.task)}`;
      if (S.filter.metadata) url += `&metadata=${encodeURIComponent(S.filter.metadata)}`;
      if (S.filter.error) url += `&error=${encodeURIComponent(S.filter.error)}`;
      if (S.filter.created_after) url += `&created_after=${new Date(S.filter.created_after).getTime()}`;
      if (S.filter.created_before) url += `&created_before=${new Date(S.filter.created_before).getTime()}`;

      S.jobs = await api(url);

      $app().innerHTML = `
    ${statsHTML(S.stats)}
    <div class="filters">
      <select id="f-status">
        <option value="">All statuses</option>
        <option value="pending" ${S.filter.status === 'pending' ? 'selected' : ''}>Pending</option>
        <option value="running" ${S.filter.status === 'running' ? 'selected' : ''}>Running</option>
        <option value="complete" ${S.filter.status === 'complete' ? 'selected' : ''}>Complete</option>
        <option value="failed" ${S.filter.status === 'failed' ? 'selected' : ''}>Failed</option>
        <option value="dead" ${S.filter.status === 'dead' ? 'selected' : ''}>Dead</option>
        <option value="cancelled" ${S.filter.status === 'cancelled' ? 'selected' : ''}>Cancelled</option>
      </select>
      <input id="f-queue" placeholder="Queue name..." value="${S.filter.queue}">
      <input id="f-task" placeholder="Task name..." value="${S.filter.task}">
      <input id="f-metadata" placeholder="Metadata search..." value="${S.filter.metadata}">
      <input id="f-error" placeholder="Error text..." value="${S.filter.error}">
      <input id="f-after" type="date" title="Created after" value="${S.filter.created_after}">
      <input id="f-before" type="date" title="Created before" value="${S.filter.created_before}">
    </div>
    ${jobTableHTML(S.jobs, true)}
  `;

      // Bind filter events
      const bindFilter = (sel, key) => {
        const el = $(sel);
        if (el) el.onchange = (e) => { S.filter[key] = e.target.value; S.page = 0; renderJobs(); };
      };
      bindFilter('#f-status', 'status');
      bindFilter('#f-queue', 'queue');
      bindFilter('#f-task', 'task');
      bindFilter('#f-metadata', 'metadata');
      bindFilter('#f-error', 'error');
      bindFilter('#f-after', 'created_after');
      bindFilter('#f-before', 'created_before');
    }

    async function renderJobDetail(id) {
      const job = await api(`/api/jobs/${id}`);
      if (job.error === 'Job not found') {
        $app().innerHTML = `<div class="empty">Job not found: ${escHtml(id)}</div>`;
        return;
      }

      const errors = await api(`/api/jobs/${id}/errors`);

      $app().innerHTML = `
    <div class="detail-panel">
      <h2>Job ${escHtml(id.slice(0, 8))}...</h2>
      <div class="detail-grid">
        <div class="label">ID</div><div class="value">${escHtml(job.id)}</div>
        <div class="label">Status</div><div class="value">${badgeHTML(job.status)}</div>
        <div class="label">Task</div><div class="value">${escHtml(job.task_name)}</div>
        <div class="label">Queue</div><div class="value">${escHtml(job.queue)}</div>
        <div class="label">Priority</div><div class="value">${job.priority}</div>
        <div class="label">Progress</div><div class="value">${progressHTML(job.progress)}</div>
        <div class="label">Retries</div><div class="value">${job.retry_count} / ${job.max_retries}</div>
        <div class="label">Created</div><div class="value">${fmtTime(job.created_at)}</div>
        <div class="label">Scheduled</div><div class="value">${fmtTime(job.scheduled_at)}</div>
        <div class="label">Started</div><div class="value">${job.started_at ? fmtTime(job.started_at) : '—'}</div>
        <div class="label">Completed</div><div class="value">${job.completed_at ? fmtTime(job.completed_at) : '—'}</div>
        <div class="label">Timeout</div><div class="value">${(job.timeout_ms / 1000).toFixed(0)}s</div>
        ${job.error ? `<div class="label">Error</div><div class="value" style="color:var(--red)">${escHtml(job.error)}</div>` : ''}
        ${job.unique_key ? `<div class="label">Unique Key</div><div class="value">${escHtml(job.unique_key)}</div>` : ''}
        ${job.metadata ? `<div class="label">Metadata</div><div class="value">${escHtml(job.metadata)}</div>` : ''}
      </div>
      ${job.status === 'pending' ? `<button class="btn danger" onclick="cancelJob('${job.id}')">Cancel Job</button>` : ''}
      <button class="btn" onclick="replayJob('${job.id}')">Replay</button>
    </div>

    ${errors.length ? `
    <div class="error-list">
      <h3 style="margin:16px 0 8px; font-size:14px;">Error History (${errors.length})</h3>
      ${errors.map(e => `
        <div class="error-item">
          <div class="attempt">Attempt ${e.attempt} — ${fmtTime(e.failed_at)}</div>
          <div>${escHtml(e.error)}</div>
        </div>
      `).join('')}
    </div>` : ''}

    ${await renderJobLogs(id)}
    ${await renderReplayHistory(id)}
    ${await renderJobDag(id)}

    <div style="margin-top:16px">
      <a href="#/jobs">&larr; Back to jobs</a>
    </div>
  `;
    }

    async function renderDeadLetters() {
      S.deadLetters = await api(`/api/dead-letters?limit=${S.pageSize}&offset=${S.page * S.pageSize}`);

      $app().innerHTML = `
    <h2 style="margin-bottom:16px; font-size:16px;">Dead Letter Queue</h2>
    ${S.deadLetters.length === 0 ? '<div class="empty">No dead letters</div>' : `
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>ID</th><th>Original Job</th><th>Task</th><th>Queue</th><th>Error</th><th>Retries</th><th>Failed At</th><th>Actions</th>
        </tr></thead>
        <tbody>
          ${S.deadLetters.map(d => `
          <tr>
            <td class="id-cell">${escHtml(d.id.slice(0, 8))}</td>
            <td class="id-cell"><a href="#/jobs/${d.original_job_id}">${escHtml(d.original_job_id.slice(0, 8))}</a></td>
            <td>${escHtml(d.task_name)}</td>
            <td>${escHtml(d.queue)}</td>
            <td style="max-width:250px; overflow:hidden; text-overflow:ellipsis;" title="${escAttr(d.error)}">${escHtml(d.error || '—')}</td>
            <td>${d.retry_count}</td>
            <td>${fmtTime(d.failed_at)}</td>
            <td><button class="btn" onclick="retryDead('${d.id}')">Retry</button></td>
          </tr>
          `).join('')}
        </tbody>
      </table>
      <div class="pagination">
        <span>Page ${S.page + 1}</span>
        <div>
          <button onclick="deadPage(-1)" ${S.page === 0 ? 'disabled' : ''}>Prev</button>
          <button onclick="deadPage(1)" ${S.deadLetters.length < S.pageSize ? 'disabled' : ''}>Next</button>
        </div>
      </div>
    </div>`}
    ${S.deadLetters.length > 0 ? `<button class="btn danger" style="margin-top:12px" onclick="purgeAll()">Purge All Dead Letters</button>` : ''}
  `;
    }

    // ── Metrics ──────────────────────────────────────────

    async function renderMetrics() {
      const metrics = await api('/api/metrics');
      const tasks = Object.keys(metrics);

      if (!tasks.length) {
        $app().innerHTML = '<h2 style="margin-bottom:16px; font-size:16px;">Task Metrics</h2><div class="empty">No metrics yet. Run some tasks first.</div>';
        return;
      }

      let rows = tasks.map(t => {
        const m = metrics[t];
        return `<tr>
      <td>${escHtml(t)}</td>
      <td>${m.count}</td>
      <td style="color:var(--green)">${m.success_count}</td>
      <td style="color:var(--red)">${m.failure_count}</td>
      <td>${m.avg_ms}ms</td>
      <td>${m.p50_ms}ms</td>
      <td>${m.p95_ms}ms</td>
      <td>${m.p99_ms}ms</td>
      <td>${m.min_ms}ms</td>
      <td>${m.max_ms}ms</td>
    </tr>`;
      }).join('');

      $app().innerHTML = `
    <h2 style="margin-bottom:16px; font-size:16px;">Task Metrics <span style="color:var(--fg2); font-size:12px;">(last hour)</span></h2>

    // ── Shared HTML builders ─────────────────────────────

    function statsHTML(s) {
      const items = [
        ['pending', s.pending || 0],
        ['running', s.running || 0],
        ['completed', s.completed || 0],
        ['failed', s.failed || 0],
        ['dead', s.dead || 0],
        ['cancelled', s.cancelled || 0],
      ];
      return `<div class="stats-grid">${items.map(([k, v]) =>
        `<div class="stat-card ${k}"><div class="value">${v.toLocaleString()}</div><div class="label">${k}</div></div>`
      ).join('')}</div>`;
    }

    function jobTableHTML(jobs, paginate) {
      if (!jobs.length) return '<div class="empty">No jobs found</div>';
      return `
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>ID</th><th>Task</th><th>Queue</th><th>Status</th><th>Priority</th><th>Progress</th><th>Retries</th><th>Created</th>
        </tr></thead>
        <tbody>
          ${jobs.map(j => `
          <tr onclick="location.hash='#/jobs/${j.id}'" style="cursor:pointer">
            <td class="id-cell">${escHtml(j.id.slice(0, 8))}</td>
            <td>${escHtml(j.task_name)}</td>
            <td>${escHtml(j.queue)}</td>
            <td>${badgeHTML(j.status)}</td>
            <td>${j.priority}</td>
            <td>${progressHTML(j.progress)}</td>
            <td>${j.retry_count}/${j.max_retries}</td>
            <td>${fmtTime(j.created_at)}</td>
          </tr>`).join('')}
        </tbody>
      </table>
      ${paginate ? `
      <div class="pagination">
        <span>Page ${S.page + 1}</span>
        <div>
          <button onclick="jobPage(-1)" ${S.page === 0 ? 'disabled' : ''}>Prev</button>
          <button onclick="jobPage(1)" ${jobs.length < S.pageSize ? 'disabled' : ''}>Next</button>
        </div>
      </div>` : ''}
    </div>
  `;
    }

    function badgeHTML(status) {
      return `<span class="badge ${status}">${status}</span>`;
    }

    function progressHTML(progress) {
      if (progress == null) return '<span style="color:var(--fg2)">—</span>';
      return `<div class="progress-bar"><div class="fill" style="width:${progress}%"></div></div> ${progress}%`;
    }

    function fmtTime(ms) {
      if (!ms) return '—';
      const d = new Date(ms);
      return d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit', second: '2-digit' })
        + ' ' + d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
    }

    function escHtml(s) {
      if (s == null) return '';
      const d = document.createElement('div');
      d.textContent = String(s);
      return d.innerHTML;
    }

    function escAttr(s) {
      return escHtml(s).replace(/"/g, '&quot;');
    }

    // ── Actions ──────────────────────────────────────────

    // ── Throughput chart ──────────────────────────────────

    function drawThroughputChart() {
      const canvas = document.getElementById('throughput-chart');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      ctx.scale(dpr, dpr);
      const w = rect.width, h = rect.height;

      const data = S.throughputHistory;
      if (data.length < 2) {
        ctx.fillStyle = 'rgba(160,160,176,0.5)';
        ctx.font = '12px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('Collecting data...', w / 2, h / 2);
        return;
      }

      const max = Math.max(...data, 1);
      const pad = { top: 10, right: 10, bottom: 20, left: 40 };
      const cw = w - pad.left - pad.right;
      const ch = h - pad.top - pad.bottom;

      // Grid lines
      ctx.strokeStyle = 'rgba(255,255,255,0.06)';
      ctx.lineWidth = 1;
      for (let i = 0; i <= 4; i++) {
        const y = pad.top + ch * (1 - i / 4);
        ctx.beginPath();
        ctx.moveTo(pad.left, y);
        ctx.lineTo(w - pad.right, y);
        ctx.stroke();
        ctx.fillStyle = 'rgba(160,160,176,0.5)';
        ctx.font = '10px sans-serif';
        ctx.textAlign = 'right';
        ctx.fillText((max * i / 4).toFixed(1), pad.left - 4, y + 3);
      }

      // Area fill
      ctx.beginPath();
      ctx.moveTo(pad.left, pad.top + ch);
      data.forEach((v, i) => {
        const x = pad.left + (i / (data.length - 1)) * cw;
        const y = pad.top + ch * (1 - v / max);
        ctx.lineTo(x, y);
      });
      ctx.lineTo(pad.left + cw, pad.top + ch);
      ctx.closePath();
      ctx.fillStyle = 'rgba(102, 187, 106, 0.15)';
      ctx.fill();

      // Line
      ctx.beginPath();
      data.forEach((v, i) => {
        const x = pad.left + (i / (data.length - 1)) * cw;
        const y = pad.top + ch * (1 - v / max);
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      });
      ctx.strokeStyle = '#66bb6a';
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    // ── DAG rendering ────────────────────────────────────

    async function renderJobDag(jobId) {
      const dag = await api(`/api/jobs/${jobId}/dag`);
      if (!dag.nodes || dag.nodes.length <= 1) return '';

      const nodeW = 160, nodeH = 36, gapX = 40, gapY = 20;
      const nodeMap = {};
      dag.nodes.forEach((n, i) => { nodeMap[n.id] = i; });

      // Simple topological-ish layout: layers by depth from root
      const adj = {};
      const inDeg = {};
      dag.nodes.forEach(n => { adj[n.id] = []; inDeg[n.id] = 0; });
      dag.edges.forEach(e => {
        adj[e.from] = adj[e.from] || [];
        adj[e.from].push(e.to);
        inDeg[e.to] = (inDeg[e.to] || 0) + 1;
      });

      const layers = [];
      const placed = new Set();
      // BFS layer assignment
      let queue = dag.nodes.filter(n => (inDeg[n.id] || 0) === 0).map(n => n.id);
      while (queue.length) {
        layers.push([...queue]);
        queue.forEach(id => placed.add(id));
        const next = [];
        queue.forEach(id => {
          (adj[id] || []).forEach(to => {
            if (!placed.has(to) && !next.includes(to)) next.push(to);
          });
        });
        queue = next;
      }
      // Place any unplaced nodes
      dag.nodes.forEach(n => { if (!placed.has(n.id)) { layers.push([n.id]); placed.add(n.id); } });

      const positions = {};
      let svgW = 0, svgH = 0;
      layers.forEach((layer, li) => {
        layer.forEach((id, ni) => {
          const x = 20 + li * (nodeW + gapX);
          const y = 20 + ni * (nodeH + gapY);
          positions[id] = { x, y };
          svgW = Math.max(svgW, x + nodeW + 20);
          svgH = Math.max(svgH, y + nodeH + 20);
        });
      });

      const statusColors = {
        pending: '#ffa726', running: '#42a5f5', complete: '#66bb6a',
        failed: '#ef5350', dead: '#ef5350', cancelled: '#a0a0b0'
      };

      let edgesSvg = dag.edges.map(e => {
        const from = positions[e.from], to = positions[e.to];
        if (!from || !to) return '';
        return `<line class="dag-edge" x1="${from.x + nodeW}" y1="${from.y + nodeH/2}" x2="${to.x}" y2="${to.y + nodeH/2}"/>`;
      }).join('');

      let nodesSvg = dag.nodes.map(n => {
        const p = positions[n.id];
        if (!p) return '';
        const fill = statusColors[n.status] || '#a0a0b0';
        return `
        <g class="dag-node" onclick="location.hash='#/jobs/${n.id}'">
          <rect x="${p.x}" y="${p.y}" width="${nodeW}" height="${nodeH}" fill="rgba(${fill === '#66bb6a' ? '102,187,106' : fill === '#ef5350' ? '239,83,80' : fill === '#42a5f5' ? '66,165,245' : fill === '#ffa726' ? '255,167,38' : '160,160,176'},0.2)" stroke="${fill}" stroke-width="1.5"/>
          <text x="${p.x + 8}" y="${p.y + 14}" fill="${fill}" font-size="10" font-weight="600">${n.status.toUpperCase()}</text>
          <text x="${p.x + 8}" y="${p.y + 28}" font-size="10" fill="var(--fg2)">${escHtml(n.task_name.length > 18 ? n.task_name.slice(-18) : n.task_name)}</text>
        </g>`;
      }).join('');

      return `
    <div class="dag-container" style="margin-top:16px">
      <h3 style="margin-bottom:8px; font-size:14px;">Dependency Graph</h3>
      <div class="chart-container" style="overflow-x:auto">
        <svg width="${svgW}" height="${svgH}">
          <defs><marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="var(--fg2)"/></marker></defs>
          ${edgesSvg}
          ${nodesSvg}
        </svg>
      </div>
    </div>`;
    }

    // ── Auto-refresh ─────────────────────────────────────

    function startRefresh() {
      stopRefresh();
      if (S.refreshMs > 0) {
        S.refreshTimer = setInterval(() => route(), S.refreshMs);
      }
    }

    function stopRefresh() {
      if (S.refreshTimer) {
        clearInterval(S.refreshTimer);
        S.refreshTimer = null;
      }
    }

    document.getElementById('refresh-interval').onchange = (e) => {
      S.refreshMs = parseInt(e.target.value);
      startRefresh();
    };

    // ── Boot ─────────────────────────────────────────────
    window.addEventListener('hashchange', route);
    route();
    startRefresh();
  </script>
