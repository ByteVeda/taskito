# GraalVM reachability metadata for the Taskito SDK.
#
# The *.json files beside this file (jni-config, reflect-config,
# resource-config, serialization-config) are auto-discovered by native-image
# and cover the SDK's JNI up-calls and Jackson DTO (de)serialization, so
# consumers do not need to trace taskito paths with the agent themselves.
#
# Regenerate from the repository with:
#   ./gradlew -Pagent :graalvm-smoke:run && ./gradlew :graalvm-smoke:metadataCopy
# then review the diff (the resource-config include for the native library must
# stay platform-generic). CI compiles graalvm-smoke against exactly this
# metadata with --no-fallback.
