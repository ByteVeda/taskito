# KEDA ScaledJob for ephemeral batch workers.
#
# Unlike ScaledObject (which scales a long-running Deployment),
# ScaledJob creates short-lived Kubernetes Jobs — one pod per N
# pending tasks. Use this for batch/ETL workloads.
#
# Prerequisites:
#   1. Deploy `taskito scaler --app myapp:queue --port 9091` as a Service
#   2. Install KEDA
apiVersion: keda.sh/v1alpha1
kind: ScaledJob
metadata:
  name: taskito-batch-worker
  namespace: default
spec:
  jobTargetRef:
    template:
      spec:
        containers:
          - name: taskito-worker
            image: your-image:latest
            command: ["taskito", "worker", "--app", "myapp:queue"]
        restartPolicy: Never
  pollingInterval: 15
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 5
  maxReplicaCount: 20
  scalingStrategy:
    strategy: default             # or "accurate" for exact 1:1 mapping
  triggers:
    - type: metrics-api
      metadata:
        url: "http://taskito-scaler:9091/api/scaler"
        valueLocation: "metricValue"
        targetValue: "5"          # one pod per 5 pending jobs
