rust:
  - changed-files:
      - any-glob-to-any-file:
          - "crates/**"
          - "Cargo.toml"
          - "Cargo.lock"

python:
  - changed-files:
      - any-glob-to-any-file:
          - "sdks/python/**"

dashboard:
  - changed-files:
      - any-glob-to-any-file:
          - "dashboard/**"

docs:
  - changed-files:
      - any-glob-to-any-file:
          - "docs/**"
          - "README.md"
          - "CHANGELOG.md"
          - "**/*.md"

tests:
  - changed-files:
      - any-glob-to-any-file:
          - "sdks/python/tests/**"
          - "**/*_test.py"
          - "**/test_*.py"
          - "**/*.test.ts"
          - "**/*.test.tsx"

ci:
  - changed-files:
      - any-glob-to-any-file:
          - ".github/**"
          - ".pre-commit-config.yaml"

storage:
  - changed-files:
      - any-glob-to-any-file:
          - "crates/taskito-core/src/storage/**"

scheduler:
  - changed-files:
      - any-glob-to-any-file:
          - "crates/taskito-core/src/scheduler/**"

workflows:
  - changed-files:
      - any-glob-to-any-file:
          - "crates/taskito-core/src/workflow*/**"
          - "sdks/python/taskito/workflows/**"
