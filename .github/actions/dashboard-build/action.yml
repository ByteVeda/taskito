name: Build dashboard
description: >-
  Sets up Node and pnpm, installs dashboard dependencies, generates the
  TanStack Router tree, and runs the Vite production build. Defaults to the
  Python wheel path; pass `out-dir` to target the Node package instead.

inputs:
  out-dir:
    description: >-
      Vite `--outDir`, relative to `dashboard/`. Omit to use the default from
      vite.config (the Python wheel path). For the Node package, pass
      `../sdks/node/static/dashboard`.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Set up pnpm
      uses: pnpm/action-setup@v6
      with:
        version: "10.30.3"

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: "22"
        cache: pnpm
        cache-dependency-path: dashboard/pnpm-lock.yaml

    - name: Install dashboard dependencies
      shell: bash
      working-directory: dashboard
      run: pnpm install --frozen-lockfile

    - name: Generate TanStack Router tree
      shell: bash
      working-directory: dashboard
      run: pnpm exec tsr generate

    - name: Vite production build
      shell: bash
      working-directory: dashboard
      run: |
        if [ -n "${{ inputs.out-dir }}" ]; then
          pnpm exec vite build --outDir "${{ inputs.out-dir }}" --emptyOutDir
        else
          pnpm exec vite build
        fi

    - name: Verify build output
      shell: bash
      run: |
        set -euo pipefail
        if [ -n "${{ inputs.out-dir }}" ]; then
          target="dashboard/${{ inputs.out-dir }}/index.html"
        else
          target="sdks/python/taskito/static/dashboard/index.html"
        fi
        if [ ! -f "$target" ]; then
          echo "::error::Dashboard build did not produce $target"
          exit 1
        fi
