version: 2

# Weekly grouped updates per ecosystem; major bumps open as their own PRs.
#
# Note on commit prefix: `include: scope` auto-appends the ecosystem scope
# (`deps` / `deps-dev`), so the configured `prefix` must be the bare type
# to avoid the doubled `chore(deps)(deps): bump X`.
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - area/rust
    commit-message:
      prefix: chore
      include: scope
    groups:
      rust-deps:
        update-types:
          - patch
          - minor

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - area/python
    commit-message:
      prefix: chore
      include: scope
    groups:
      python-deps:
        update-types:
          - patch
          - minor

  - package-ecosystem: npm
    directory: /dashboard
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - area/dashboard
    commit-message:
      prefix: chore
      include: scope
    groups:
      dashboard-deps:
        update-types:
          - patch
          - minor
      # Co-released ecosystems pinned together so compatible sets land in one PR.
      radix:
        patterns:
          - "@radix-ui/*"
      tanstack:
        patterns:
          - "@tanstack/*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - area/ci
    commit-message:
      prefix: chore(ci)
    groups:
      actions:
        update-types:
          - patch
          - minor
          - major
