version: 2

# Weekly grouped updates per ecosystem; major bumps open as their own PRs.
updates:
  - package-ecosystem: cargo
    directory: /
    schedule: &weekly
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - area/rust
    # `include: scope` auto-appends the ecosystem scope, so prefix must be
    # the bare type to avoid the doubled `chore(deps)(deps): bump X`.
    commit-message: &chore-deps-scoped
      prefix: chore
      include: scope
    groups:
      rust-deps:
        update-types:
          - patch
          - minor

  - package-ecosystem: pip
    directory: /
    schedule: *weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - area/python
    commit-message: *chore-deps-scoped
    groups:
      python-deps:
        update-types:
          - patch
          - minor

  - package-ecosystem: npm
    directory: /dashboard
    schedule: *weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - area/dashboard
    commit-message: *chore-deps-scoped
    groups:
      dashboard-deps:
        update-types:
          - patch
          - minor
      # Co-released ecosystems pinned together so compatible sets land in one PR.
      radix:
        patterns:
          - "@radix-ui/*"
      tanstack:
        patterns:
          - "@tanstack/*"

  - package-ecosystem: github-actions
    directory: /
    schedule: *weekly
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - area/ci
    commit-message:
      prefix: chore(ci)
    groups:
      actions:
        update-types:
          - patch
          - minor
          - major
