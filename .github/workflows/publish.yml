name: Publish to PyPI

on:
  push:
    tags:
      - "[0-9]*.[0-9]*.[0-9]*"
      - "v[0-9]*.[0-9]*.[0-9]*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.16.1)"
        required: true
        type: string
      dry-run:
        description: "Build and validate only — skip PyPI upload and tagging"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  preflight:
    name: Preflight checks
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Resolve version
        id: resolve
        env:
          VERSION_INPUT: ${{ inputs.version }}
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="${VERSION_INPUT}"
            version="${version#v}"
          fi
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format: ${version}"
            exit 1
          fi
          printf 'version=%s\n' "$version" >> "$GITHUB_OUTPUT"

      - name: Verify version matches codebase
        env:
          VERSION: ${{ steps.resolve.outputs.version }}
        run: |
          node scripts/version.mjs --check
          repo_version="$(node scripts/version.mjs --current)"
          if [ "$repo_version" != "$VERSION" ]; then
            echo "::error::Requested ${VERSION} but the repo declares ${repo_version}"
            exit 1
          fi

      - name: Check tag does not exist
        if: github.event_name != 'push'
        run: |
          version="${{ steps.resolve.outputs.version }}"
          if git ls-remote --tags origin | awk -v tag="refs/tags/${version}" '$2 == tag { found=1 } END { exit !found }'; then
            echo "::error::Tag ${version} already exists on remote"
            exit 1
          fi

  build-dashboard:
    needs: preflight
    name: Build dashboard assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: ./.github/actions/dashboard-build

      - name: Upload dashboard artifact
        uses: actions/upload-artifact@v7
        with:
          name: dashboard-dist
          path: sdks/python/taskito/static/dashboard
          if-no-files-found: error
          retention-days: 1

  build-wheels-linux:
    needs: build-dashboard
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: ./.github/actions/download-dashboard

      - name: Build wheels
        uses: PyO3/maturin-action@v1.51.0
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --features extension-module,postgres,redis,native-async,workflows --interpreter 3.10 3.11 3.12 3.13 3.14
          manylinux: 2_28
          maturin-version: v1.13.3
          working-directory: sdks/python
          before-script-linux: |
            dnf install -y openssl-devel perl-core perl-IPC-Cmd

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-linux-${{ matrix.target }}
          path: sdks/python/dist/*.whl
          if-no-files-found: error

  build-wheels-musllinux:
    needs: build-dashboard
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: ./.github/actions/download-dashboard

      - name: Build wheels
        uses: PyO3/maturin-action@v1.51.0
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --features extension-module,postgres,redis,native-async,workflows --interpreter 3.10 3.11 3.12 3.13 3.14
          manylinux: musllinux_1_2
          maturin-version: v1.13.3
          working-directory: sdks/python
          before-script-linux: |
            apt-get update && apt-get install -y libssl-dev perl pkg-config

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-musllinux-${{ matrix.target }}
          path: sdks/python/dist/*.whl
          if-no-files-found: error

  build-wheels-macos:
    needs: build-dashboard
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-apple-darwin
          - aarch64-apple-darwin
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: ./.github/actions/download-dashboard

      - name: Set up Python 3.10
        uses: actions/setup-python@v7
        with:
          python-version: "3.10"

      - name: Set up Python 3.11
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"

      - name: Set up Python 3.12
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Set up Python 3.13
        uses: actions/setup-python@v7
        with:
          python-version: "3.13"

      - name: Set up Python 3.14
        uses: actions/setup-python@v7
        with:
          python-version: "3.14"

      - name: Build wheels
        uses: PyO3/maturin-action@v1.51.0
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --features extension-module,postgres,redis,native-async,workflows --interpreter 3.10 3.11 3.12 3.13 3.14
          maturin-version: v1.13.3
          working-directory: sdks/python

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-macos-${{ matrix.target }}
          path: sdks/python/dist/*.whl
          if-no-files-found: error

  build-wheels-windows:
    needs: build-dashboard
    runs-on: windows-2025
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: ./.github/actions/download-dashboard

      - name: Set up Python 3.10
        uses: actions/setup-python@v7
        with:
          python-version: "3.10"

      - name: Set up Python 3.11
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"

      - name: Set up Python 3.12
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Set up Python 3.13
        uses: actions/setup-python@v7
        with:
          python-version: "3.13"

      - name: Set up Python 3.14
        uses: actions/setup-python@v7
        with:
          python-version: "3.14"

      - name: Build wheels
        uses: PyO3/maturin-action@v1.51.0
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --features extension-module,postgres,redis,native-async,workflows --interpreter 3.10 3.11 3.12 3.13 3.14
          maturin-version: v1.13.3
          working-directory: sdks/python

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-windows-${{ matrix.target }}
          path: sdks/python/dist/*.whl
          if-no-files-found: error

  build-sdist:
    needs: build-dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: ./.github/actions/download-dashboard

      - name: Build sdist
        uses: PyO3/maturin-action@v1.51.0
        with:
          command: sdist
          args: --out dist
          maturin-version: v1.13.3
          working-directory: sdks/python

      - name: Upload sdist
        uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: sdks/python/dist/*.tar.gz
          if-no-files-found: error

  publish:
    needs: [preflight, build-wheels-linux, build-wheels-musllinux, build-wheels-macos, build-wheels-windows, build-sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write
      id-token: write
    env:
      VERSION: ${{ needs.preflight.outputs.version }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Download wheel and sdist artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: "{wheels-*,sdist}"
          path: dist
          merge-multiple: true

      - name: Validate wheels
        run: |
          pip install check-wheel-contents
          for whl in dist/*.whl; do
            unzip -qt "$whl"
          done
          check-wheel-contents --ignore W009,W010 dist/*.whl

      - name: Check PyPI for existing version
        id: pypi-check
        run: |
          python3 - "$VERSION" <<'PYCHECK'
          import hashlib, json, os, sys, urllib.request
          from pathlib import Path

          version = sys.argv[1]
          dist = Path("dist")
          url = f"https://pypi.org/pypi/taskito/{version}/json"
          req = urllib.request.Request(url, headers={"User-Agent": "taskito-release/1.0"})

          try:
              resp = urllib.request.urlopen(req, timeout=30)
              remote = {f["filename"]: f["digests"]["sha256"] for f in json.loads(resp.read())["urls"]}
          except urllib.error.HTTPError as e:
              if e.code == 404:
                  remote = {}
              else:
                  raise

          local = {}
          for p in sorted(dist.iterdir()):
              if p.suffix in (".whl", ".gz"):
                  local[p.name] = hashlib.sha256(p.read_bytes()).hexdigest()

          conflicts = [f for f in local if f in remote and local[f] != remote[f]]
          if conflicts:
              for f in conflicts:
                  print(f"::error::Hash conflict: {f} (local {local[f][:12]}… vs remote {remote[f][:12]}…)")
              sys.exit(1)

          missing = [f for f in local if f not in remote]
          out = os.environ["GITHUB_OUTPUT"]
          with open(out, "a") as fh:
              if not missing:
                  fh.write("all_uploaded=true\n")
                  print(f"::notice::All {len(local)} artifacts on PyPI — skipping upload")
              else:
                  fh.write("all_uploaded=false\n")
                  print(f"::notice::{len(missing)}/{len(local)} artifact(s) missing on PyPI")
          PYCHECK

      - name: Set up uv
        if: steps.pypi-check.outputs.all_uploaded != 'true' && !inputs.dry-run
        uses: astral-sh/setup-uv@v7

      - name: Publish to PyPI
        if: steps.pypi-check.outputs.all_uploaded != 'true' && !inputs.dry-run
        run: uv publish --trusted-publishing always dist/*

      - name: Verify version on PyPI
        if: "!inputs.dry-run"
        run: |
          for _attempt in 1 2 3 4 5; do
            status=$(curl -s -o /dev/null -w '%{http_code}' --head \
              --connect-timeout 10 --max-time 30 \
              -H "User-Agent: taskito-release/1.0" \
              "https://pypi.org/pypi/taskito/${VERSION}/json")
            if [ "$status" = "200" ]; then
              echo "taskito==${VERSION} live on PyPI"
              exit 0
            fi
            sleep 15
          done
          echo "::error::taskito==${VERSION} not found on PyPI"
          exit 1

      - name: Create git tag
        if: github.event_name != 'push' && !inputs.dry-run
        run: |
          git tag "$VERSION"
          git push origin "$VERSION"

      - name: Create GitHub release
        if: "!inputs.dry-run"
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "::notice::Release ${VERSION} already exists — skipping"
          else
            gh release create "$VERSION" \
              --title "v${VERSION}" \
              --generate-notes
          fi
