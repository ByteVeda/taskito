name: Publish to PyPI

on:
  push:
    tags: ["[0-9]+.[0-9]+.[0-9]+*"]

permissions:
  contents: read

jobs:
  build-dashboard:
    name: Build dashboard assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/dashboard-build

      - name: Upload dashboard artifact
        uses: actions/upload-artifact@v7
        with:
          name: dashboard-dist
          path: py_src/taskito/static/dashboard
          if-no-files-found: error
          retention-days: 1

  build-wheels-linux:
    needs: build-dashboard
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v6

      - name: Download dashboard assets
        uses: actions/download-artifact@v8
        with:
          name: dashboard-dist
          path: py_src/taskito/static/dashboard

      - name: Verify dashboard assets present
        shell: bash
        run: test -f py_src/taskito/static/dashboard/index.html

      - name: Build wheels
        uses: PyO3/maturin-action@v1.51.0
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --features extension-module,postgres,redis,native-async,workflows --interpreter 3.10 3.11 3.12 3.13
          manylinux: 2_28
          maturin-version: v1.13.3
          before-script-linux: |
            dnf install -y openssl-devel perl-core perl-IPC-Cmd

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist/*.whl
          if-no-files-found: error

  build-wheels-musllinux:
    needs: build-dashboard
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v6

      - name: Download dashboard assets
        uses: actions/download-artifact@v8
        with:
          name: dashboard-dist
          path: py_src/taskito/static/dashboard

      - name: Verify dashboard assets present
        shell: bash
        run: test -f py_src/taskito/static/dashboard/index.html

      - name: Build wheels
        uses: PyO3/maturin-action@v1.51.0
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --features extension-module,postgres,redis,native-async,workflows --interpreter 3.10 3.11 3.12 3.13
          manylinux: musllinux_1_2
          maturin-version: v1.13.3
          before-script-linux: |
            apt-get update && apt-get install -y libssl-dev perl pkg-config

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-musllinux-${{ matrix.target }}
          path: dist/*.whl
          if-no-files-found: error

  build-wheels-macos:
    needs: build-dashboard
    runs-on: macos-latest
    strategy:
      matrix:
        target:
          - x86_64-apple-darwin
          - aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v6

      - name: Download dashboard assets
        uses: actions/download-artifact@v8
        with:
          name: dashboard-dist
          path: py_src/taskito/static/dashboard

      - name: Verify dashboard assets present
        shell: bash
        run: test -f py_src/taskito/static/dashboard/index.html

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Build wheels
        uses: PyO3/maturin-action@v1.51.0
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --features extension-module,postgres,redis,native-async,workflows --interpreter 3.10 3.11 3.12 3.13
          maturin-version: v1.13.3

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist/*.whl
          if-no-files-found: error

  build-wheels-windows:
    needs: build-dashboard
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v6

      - name: Download dashboard assets
        uses: actions/download-artifact@v8
        with:
          name: dashboard-dist
          path: py_src/taskito/static/dashboard

      - name: Verify dashboard assets present
        shell: bash
        run: test -f py_src/taskito/static/dashboard/index.html

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Build wheels
        uses: PyO3/maturin-action@v1.51.0
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --features extension-module,postgres,redis,native-async,workflows --interpreter 3.10 3.11 3.12 3.13
          maturin-version: v1.13.3

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-windows-${{ matrix.target }}
          path: dist/*.whl
          if-no-files-found: error

  build-sdist:
    needs: build-dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download dashboard assets
        uses: actions/download-artifact@v8
        with:
          name: dashboard-dist
          path: py_src/taskito/static/dashboard

      - name: Verify dashboard assets present
        shell: bash
        run: test -f py_src/taskito/static/dashboard/index.html

      - name: Build sdist
        uses: PyO3/maturin-action@v1.51.0
        with:
          command: sdist
          args: --out dist
          maturin-version: v1.13.3

      - name: Upload sdist
        uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  publish:
    needs: [build-wheels-linux, build-wheels-musllinux, build-wheels-macos, build-wheels-windows, build-sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download wheel and sdist artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: "{wheels-*,sdist}"
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
