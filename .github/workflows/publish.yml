name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.16.1)"
        required: true
        type: string
      dry-run:
        description: "Build and validate only — skip PyPI upload and tagging"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  preflight:
    name: Preflight checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Verify version matches codebase
        run: |
          version="${{ inputs.version }}"
          pyproject_ver=$(python3 -c "
          import re, pathlib
          m = re.search(r'^version\s*=\s*\"(.+?)\"', pathlib.Path('pyproject.toml').read_text(), re.M)
          print(m.group(1))
          ")
          if [ "$pyproject_ver" != "$version" ]; then
            echo "::error::Input version ${version} != pyproject.toml version ${pyproject_ver}"
            exit 1
          fi

      - name: Check tag does not exist
        run: |
          version="${{ inputs.version }}"
          if git ls-remote --tags origin | awk -v tag="refs/tags/${version}" '$2 == tag { found=1 } END { exit !found }'; then
            echo "::error::Tag ${version} already exists on remote"
            exit 1
          fi

  build-dashboard:
    needs: preflight
    name: Build dashboard assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: ./.github/actions/dashboard-build

      - name: Upload dashboard artifact
        uses: actions/upload-artifact@v7
        with:
          name: dashboard-dist
          path: py_src/taskito/static/dashboard
          if-no-files-found: error
          retention-days: 1

  build-wheels-linux:
    needs: build-dashboard
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: ./.github/actions/download-dashboard

      - name: Build wheels
        uses: PyO3/maturin-action@v1.51.0
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --features extension-module,postgres,redis,native-async,workflows --interpreter 3.10 3.11 3.12 3.13
          manylinux: 2_28
          maturin-version: v1.13.3
          before-script-linux: |
            dnf install -y openssl-devel perl-core perl-IPC-Cmd

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist/*.whl
          if-no-files-found: error

  build-wheels-musllinux:
    needs: build-dashboard
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: ./.github/actions/download-dashboard

      - name: Build wheels
        uses: PyO3/maturin-action@v1.51.0
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --features extension-module,postgres,redis,native-async,workflows --interpreter 3.10 3.11 3.12 3.13
          manylinux: musllinux_1_2
          maturin-version: v1.13.3
          before-script-linux: |
            apt-get update && apt-get install -y libssl-dev perl pkg-config

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-musllinux-${{ matrix.target }}
          path: dist/*.whl
          if-no-files-found: error

  build-wheels-macos:
    needs: build-dashboard
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-apple-darwin
          - aarch64-apple-darwin
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: ./.github/actions/download-dashboard

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Build wheels
        uses: PyO3/maturin-action@v1.51.0
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --features extension-module,postgres,redis,native-async,workflows --interpreter 3.10 3.11 3.12 3.13
          maturin-version: v1.13.3

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist/*.whl
          if-no-files-found: error

  build-wheels-windows:
    needs: build-dashboard
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: ./.github/actions/download-dashboard

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Build wheels
        uses: PyO3/maturin-action@v1.51.0
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --features extension-module,postgres,redis,native-async,workflows --interpreter 3.10 3.11 3.12 3.13
          maturin-version: v1.13.3

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-windows-${{ matrix.target }}
          path: dist/*.whl
          if-no-files-found: error

  build-sdist:
    needs: build-dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: ./.github/actions/download-dashboard

      - name: Build sdist
        uses: PyO3/maturin-action@v1.51.0
        with:
          command: sdist
          args: --out dist
          maturin-version: v1.13.3

      - name: Upload sdist
        uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  publish:
    needs: [build-wheels-linux, build-wheels-musllinux, build-wheels-macos, build-wheels-windows, build-sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Download wheel and sdist artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: "{wheels-*,sdist}"
          path: dist
          merge-multiple: true

      - name: Validate wheels
        run: |
          pip install check-wheel-contents
          for whl in dist/*.whl; do
            unzip -qt "$whl"
          done
          check-wheel-contents --ignore W009,W010 dist/*.whl

      - name: Check PyPI for existing version
        id: pypi-check
        run: |
          version="${{ inputs.version }}"
          python3 - "$version" <<'PYCHECK'
          import hashlib, json, os, sys, urllib.request
          from pathlib import Path

          version = sys.argv[1]
          dist = Path("dist")
          url = f"https://pypi.org/pypi/taskito/{version}/json"
          req = urllib.request.Request(url, headers={"User-Agent": "taskito-release/1.0"})

          try:
              resp = urllib.request.urlopen(req, timeout=30)
              remote = {f["filename"]: f["digests"]["sha256"] for f in json.loads(resp.read())["urls"]}
          except urllib.error.HTTPError as e:
              if e.code == 404:
                  remote = {}
              else:
                  raise

          local = {}
          for p in sorted(dist.iterdir()):
              if p.suffix in (".whl", ".gz"):
                  local[p.name] = hashlib.sha256(p.read_bytes()).hexdigest()

          conflicts = [f for f in local if f in remote and local[f] != remote[f]]
          if conflicts:
              for f in conflicts:
                  print(f"::error::Hash conflict: {f} (local {local[f][:12]}… vs remote {remote[f][:12]}…)")
              sys.exit(1)

          missing = [f for f in local if f not in remote]
          out = os.environ["GITHUB_OUTPUT"]
          with open(out, "a") as fh:
              if not missing:
                  fh.write("all_uploaded=true\n")
                  print(f"::notice::All {len(local)} artifacts on PyPI — skipping upload")
              else:
                  fh.write("all_uploaded=false\n")
                  print(f"::notice::{len(missing)}/{len(local)} artifact(s) missing on PyPI")
          PYCHECK

      - name: Publish to PyPI
        if: steps.pypi-check.outputs.all_uploaded != 'true' && !inputs.dry-run
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist/
          skip-existing: true

      - name: Verify version on PyPI
        if: "!inputs.dry-run"
        run: |
          version="${{ inputs.version }}"
          for _attempt in 1 2 3 4 5; do
            status=$(curl -s -o /dev/null -w '%{http_code}' --head \
              --connect-timeout 10 --max-time 30 \
              -H "User-Agent: taskito-release/1.0" \
              "https://pypi.org/pypi/taskito/${version}/json")
            if [ "$status" = "200" ]; then
              echo "taskito==${version} live on PyPI"
              exit 0
            fi
            sleep 15
          done
          echo "::error::taskito==${version} not found on PyPI"
          exit 1

      - name: Create git tag
        if: "!inputs.dry-run"
        run: |
          git tag "${{ inputs.version }}"
          git push origin "${{ inputs.version }}"

      - name: Create GitHub release
        if: "!inputs.dry-run"
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ inputs.version }}" \
            --title "v${{ inputs.version }}" \
            --generate-notes
