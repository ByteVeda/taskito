name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2.8.2

      - name: Cargo fmt
        run: cargo fmt --all --check

      - name: Cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Install Python dev deps
        run: pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check py_src/ tests/

      - name: Ruff format check
        run: ruff format --check py_src/ tests/

      - name: Mypy
        run: mypy py_src/taskito/

  rust-test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2.8.2

      - name: Run Rust tests
        run: cargo test --workspace
        env:
          LD_LIBRARY_PATH: ${{ env.pythonLocation }}/lib

  test:
    needs: [lint, rust-test]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
        include:
          - os: macos-latest
            python-version: "3.13"
          - os: macos-latest
            python-version: "3.9"
          - os: windows-latest
            python-version: "3.13"
          - os: windows-latest
            python-version: "3.9"
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2.8.2

      - name: Create virtualenv (Unix)
        if: runner.os != 'Windows'
        run: |
          python -m venv .venv
          echo "${{ github.workspace }}/.venv/bin" >> $GITHUB_PATH
          echo "VIRTUAL_ENV=${{ github.workspace }}/.venv" >> $GITHUB_ENV

      - name: Create virtualenv (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m venv .venv
          echo "${{ github.workspace }}\.venv\Scripts" >> $env:GITHUB_PATH
          echo "VIRTUAL_ENV=${{ github.workspace }}\.venv" >> $env:GITHUB_ENV

      - name: Install maturin
        run: pip install maturin

      - name: Build and install
        run: |
          pip install -e ".[dev]"
          maturin develop --release

      - name: Run Python tests
        run: |
          set +e
          pytest tests/python/ -v --junitxml=test-results.xml
          PYTEST_EXIT=$?
          if [ $PYTEST_EXIT -eq 0 ]; then exit 0; fi
          # SIGABRT (134) during interpreter shutdown is a known PyO3 issue;
          # check junit XML to confirm all tests actually passed.
          if [ $PYTEST_EXIT -eq 134 ] && [ -f test-results.xml ]; then
            FAILURES=$(python -c "
          import xml.etree.ElementTree as ET
          r = ET.parse('test-results.xml').getroot()
          print(int(r.get('failures',0)) + int(r.get('errors',0)))
          ")
            if [ "$FAILURES" = "0" ]; then
              echo "::warning::Tests passed but process crashed during cleanup (known PyO3 issue on this Python version)"
              exit 0
            fi
          fi
          exit $PYTEST_EXIT
        shell: bash
