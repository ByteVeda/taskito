name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install ruff mypy

      - name: Ruff check
        run: ruff check py_src/

      - name: Ruff format check
        run: ruff format --check py_src/

      - name: Mypy
        run: mypy py_src/taskito/ --ignore-missing-imports

  test:
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Create virtualenv (Unix)
        if: runner.os != 'Windows'
        run: |
          python -m venv .venv
          echo "${{ github.workspace }}/.venv/bin" >> $GITHUB_PATH
          echo "VIRTUAL_ENV=${{ github.workspace }}/.venv" >> $GITHUB_ENV

      - name: Create virtualenv (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m venv .venv
          echo "${{ github.workspace }}\.venv\Scripts" >> $env:GITHUB_PATH
          echo "VIRTUAL_ENV=${{ github.workspace }}\.venv" >> $env:GITHUB_ENV

      - name: Install maturin
        run: pip install maturin

      - name: Build and install
        run: |
          pip install -e ".[dev]"
          maturin develop --release

      - name: Run Rust tests
        run: cargo test --workspace

      - name: Run Python tests
        run: pytest tests/python/ -v

  build-wheels:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build wheels (with postgres)
        if: runner.os == 'Linux'
        uses: PyO3/maturin-action@v1
        with:
          args: --release --out dist --features postgres
          manylinux: auto
          before-script-linux: yum install -y openssl-devel perl-IPC-Cmd

      - name: Build wheels
        if: runner.os != 'Linux'
        uses: PyO3/maturin-action@v1
        with:
          args: --release --out dist
          manylinux: auto

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/*.whl
