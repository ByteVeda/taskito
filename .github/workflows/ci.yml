name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Restore Cargo cache
        uses: Swatinem/rust-cache@v2.9.1

      - name: Check Rust formatting
        run: cargo fmt --all --check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.10.12"
          cache-dependency-glob: pyproject.toml

      - name: Install Python dependencies
        run: uv sync --extra dev

      - name: Lint Python with Ruff
        run: uv run ruff check py_src/ tests/

      - name: Check Python formatting with Ruff
        run: uv run ruff format --check py_src/ tests/

      - name: Type-check Python with mypy
        run: uv run mypy py_src/taskito/ tests/python/ --no-incremental

  rust-test:
    name: Rust Tests (SQLite)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Cargo cache
        uses: Swatinem/rust-cache@v2.9.1
        with:
          save-if: false

      - name: Run Rust test suite
        run: cargo test --workspace
        env:
          LD_LIBRARY_PATH: ${{ env.pythonLocation }}/lib

      - name: Check build with native-async features
        run: cargo check --workspace --features native-async

  rust-test-postgres:
    name: Rust Tests (PostgreSQL)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test
          POSTGRES_DB: taskito_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Cargo cache
        uses: Swatinem/rust-cache@v2.9.1
        with:
          save-if: false

      - name: Run Rust test suite (PostgreSQL backend)
        run: cargo test --workspace --features postgres
        env:
          LD_LIBRARY_PATH: ${{ env.pythonLocation }}/lib
          TASKITO_POSTGRES_TEST_URL: postgres://postgres:test@localhost:5432/taskito_test

  rust-test-redis:
    name: Rust Tests (Redis)
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Cargo cache
        uses: Swatinem/rust-cache@v2.9.1
        with:
          save-if: false

      - name: Run Rust test suite (Redis backend)
        run: cargo test --workspace --features redis
        env:
          LD_LIBRARY_PATH: ${{ env.pythonLocation }}/lib
          TASKITO_REDIS_TEST_URL: redis://localhost:6379/15

  test:
    name: Python Tests (${{ matrix.os }} / Python ${{ matrix.python-version }})
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        include:
          - os: macos-latest
            python-version: "3.13"
          - os: macos-latest
            python-version: "3.10"
          - os: windows-latest
            python-version: "3.13"
          - os: windows-latest
            python-version: "3.10"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Cargo cache
        uses: Swatinem/rust-cache@v2.9.1
        with:
          save-if: ${{ matrix.os != 'ubuntu-latest' }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.10.12"
          cache-dependency-glob: pyproject.toml

      - name: Install Python dependencies
        run: uv sync --extra dev

      - name: Build native extension with maturin
        uses: PyO3/maturin-action@v1
        with:
          command: develop
          args: --release --features extension-module,postgres,redis,native-async,workflows

      - name: Run Python test suite
        run: |
          set +e
          uv run python -m pytest tests/python/ -v --junitxml=test-results.xml
          PYTEST_EXIT=$?
          if [ $PYTEST_EXIT -eq 0 ]; then exit 0; fi
          # SIGABRT (134) during interpreter shutdown is a known PyO3 issue;
          # check junit XML to confirm all tests actually passed.
          if [ $PYTEST_EXIT -eq 134 ] && [ -f test-results.xml ]; then
            FAILURES=$(python -c "
          import xml.etree.ElementTree as ET
          r = ET.parse('test-results.xml').getroot()
          print(int(r.get('failures',0)) + int(r.get('errors',0)))
          ")
            if [ "$FAILURES" = "0" ]; then
              echo "::warning::Tests passed but process crashed during cleanup (known PyO3 issue)"
              exit 0
            fi
          fi
          exit $PYTEST_EXIT
        shell: bash
