name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  # Allow manual re-triggers from the GitHub UI or `gh workflow run` —
  # useful when master squash-merges arrive back-to-back and concurrency
  # cancellations leave the latest master HEAD without a CI run.
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# CI only reads the repo — no job writes contents, issues, or PRs. Pin the
# token to least privilege so a compromised step can't escalate.
permissions:
  contents: read

# Cargo's HTTP downloader intermittently aborts crate downloads on CI
# ("Error in the HTTP2 framing layer" / "unexpected eof while reading") when
# fetching uncached crates from crates.io. Force HTTP/1.1 and raise the retry
# budget so a transient download error retries instead of failing the job.
# Set at workflow level so it also covers the maturin build that `uv sync`
# triggers inside the setup-python action, before setup-rust runs.
env:
  CARGO_HTTP_MULTIPLEXING: "false"
  CARGO_NET_RETRY: "10"

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      python: ${{ steps.filter.outputs.python }}
      node: ${{ steps.filter.outputs.node }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            rust:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - '.github/actions/**'
              - '.github/workflows/ci.yml'
            python:
              - 'sdks/python/**'
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/actions/**'
              - '.github/workflows/ci.yml'
            node:
              - 'sdks/node/**'
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'dashboard/**'
              - '.github/actions/**'
              - '.github/workflows/ci.yml'

  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python + uv
        uses: ./.github/actions/setup-python

      - name: Set up Rust
        uses: ./.github/actions/setup-rust
        with:
          components: rustfmt, clippy
          save-if: "true" # the lint job is the sole Cargo cache writer

      - name: Check Rust formatting
        run: cargo fmt --all --check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Generic crates stay binding-free
        # The engine crates (core/workflows/mesh) must remain binding-agnostic so
        # the Python and Node shells can both reuse them. A pyo3 OR napi dep would
        # let binding-specific code creep back in. cargo tree is authoritative —
        # you cannot `use pyo3`/`use napi` without depending on it.
        # See crates/taskito-core/BINDING_CONTRACT.md.
        run: |
          set -euo pipefail
          for crate in taskito-core taskito-workflows taskito-mesh; do
            # Capture first so a `cargo tree` failure aborts (set -e) instead of
            # being swallowed by the pipe and silently passing the check.
            tree_output="$(cargo tree -p "$crate" -e normal --all-features)"
            for binding in pyo3 napi; do
              if grep -qi "$binding" <<<"$tree_output"; then
                echo "::error::$binding is in the dependency tree of $crate — generic crates must stay binding-agnostic"
                exit 1
              fi
            done
          done
          echo "Generic crates are free of pyo3 and napi."

      - name: Lint Python with Ruff
        working-directory: sdks/python
        run: uv run ruff check taskito/ tests/

      - name: Check Python formatting with Ruff
        working-directory: sdks/python
        run: uv run ruff format --check taskito/ tests/

      - name: Type-check Python with mypy
        working-directory: sdks/python
        run: uv run mypy taskito/ tests/ --no-incremental

  rust-test:
    name: Rust Tests (SQLite)
    needs: changes
    if: needs.changes.outputs.rust == 'true' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python (libpython for the linked extension)
        uses: ./.github/actions/setup-python
        with:
          sync: "false"

      - name: Set up Rust
        uses: ./.github/actions/setup-rust

      - name: Run Rust test suite
        # $pythonLocation is exported to the job env by setup-python at runtime.
        run: LD_LIBRARY_PATH="$pythonLocation/lib" cargo test --workspace

      - name: Check build with native-async features
        run: cargo check --workspace --features native-async

      - name: Check build with mesh feature
        run: cargo check --workspace --features mesh

  rust-test-postgres:
    name: Rust Tests (PostgreSQL)
    needs: changes
    if: needs.changes.outputs.rust == 'true' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test
          POSTGRES_DB: taskito_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python (libpython for the linked extension)
        uses: ./.github/actions/setup-python
        with:
          sync: "false"

      - name: Set up Rust
        uses: ./.github/actions/setup-rust

      - name: Run Rust test suite (PostgreSQL backend)
        run: LD_LIBRARY_PATH="$pythonLocation/lib" cargo test --workspace --features postgres,workflows
        env:
          TASKITO_POSTGRES_TEST_URL: postgres://postgres:test@localhost:5432/taskito_test

  rust-test-redis:
    name: Rust Tests (Redis)
    needs: changes
    if: needs.changes.outputs.rust == 'true' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python (libpython for the linked extension)
        uses: ./.github/actions/setup-python
        with:
          sync: "false"

      - name: Set up Rust
        uses: ./.github/actions/setup-rust

      - name: Run Rust test suite (Redis backend)
        run: LD_LIBRARY_PATH="$pythonLocation/lib" cargo test --workspace --features redis,workflows
        env:
          TASKITO_REDIS_TEST_URL: redis://localhost:6379/15

  rust-test-mesh:
    name: Rust Tests (Mesh)
    needs: changes
    if: needs.changes.outputs.rust == 'true' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python (libpython for the linked extension)
        uses: ./.github/actions/setup-python
        with:
          sync: "false"

      - name: Set up Rust
        uses: ./.github/actions/setup-rust

      - name: Run mesh crate tests
        run: LD_LIBRARY_PATH="$pythonLocation/lib" cargo test -p taskito-mesh

  node-test:
    name: Node SDK Tests
    needs: changes
    if: needs.changes.outputs.node == 'true' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: ./.github/actions/setup-rust

      - name: Set up Node + pnpm
        uses: ./.github/actions/setup-node

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: pnpm install --frozen-lockfile

      - name: Build addon, TypeScript, and dashboard SPA
        working-directory: sdks/node
        run: |
          pnpm run build:native
          pnpm run build:ts
          pnpm -C ../../dashboard exec tsr generate   # route tree is gitignored
          pnpm run build:dashboard

      - name: Typecheck
        working-directory: sdks/node
        run: pnpm typecheck

      - name: Lint
        working-directory: sdks/node
        run: pnpm lint

      - name: Run Node test suite
        working-directory: sdks/node
        run: pnpm test

  test:
    name: Python Tests (${{ matrix.os }} / Python ${{ matrix.python-version }})
    needs: [lint, changes]
    if: needs.changes.outputs.python == 'true' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.os }}
    env:
      # setup-python on macOS upgrades certifi via pip; pip's HTTP cache
      # occasionally fails to deserialize across runner image versions and
      # surfaces as a noisy "Cache entry deserialization failed" annotation.
      # Disabling pip's cache eliminates the warning at zero cost (we use uv
      # for actual package installs).
      PIP_NO_CACHE_DIR: "1"
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        include:
          - os: macos-latest
            python-version: "3.13"
          - os: macos-latest
            python-version: "3.10"
          - os: windows-2025
            python-version: "3.13"
          - os: windows-2025
            python-version: "3.10"
    steps:
      - name: Point vendored OpenSSL at Strawberry Perl (Windows)
        if: runner.os == 'Windows'
        shell: bash
        # The postgres feature pulls openssl-sys (vendored), whose Configure
        # runs perl. Under `shell: bash` the incomplete MSYS perl shadows the
        # runner's Strawberry Perl and lacks modules OpenSSL needs
        # (Locale::Maketext::Simple), so pin openssl-src to Strawberry Perl.
        # Must precede the maturin build that `uv sync` triggers below.
        run: echo "OPENSSL_SRC_PERL=C:/Strawberry/perl/bin/perl.exe" >> "$GITHUB_ENV"

      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python + uv
        uses: ./.github/actions/setup-python
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Rust
        uses: ./.github/actions/setup-rust
        with:
          # Only the non-Linux runners save the cache here; the Linux Cargo
          # cache is written by the lint job.
          save-if: ${{ matrix.os != 'ubuntu-latest' }}

      - name: Build native extension with maturin
        uses: PyO3/maturin-action@v1.51.0
        with:
          command: develop
          args: --release --features extension-module,postgres,redis,native-async,workflows,mesh
          maturin-version: v1.13.3
          working-directory: sdks/python

      - name: Run Python test suite
        working-directory: sdks/python
        # The pytest_unconfigure hook in tests/conftest.py calls
        # ``os._exit(0)`` on a clean run to bypass CPython finalization and
        # avoid the PyO3 daemon-thread SIGABRT we used to paper over here.
        run: uv run python -m pytest tests/ -v --junitxml=test-results.xml

  ci-status:
    name: CI status
    if: always()
    needs: [lint, rust-test, rust-test-postgres, rust-test-redis, rust-test-mesh, node-test, test]
    runs-on: ubuntu-latest
    steps:
      - name: Check that no required job failed
        run: |
          results='${{ toJson(needs) }}'
          echo "$results"
          fail=$(echo "$results" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          bad = [k for k, v in data.items() if v['result'] not in ('success', 'skipped')]
          print(','.join(bad))
          ")
          if [ -n "$fail" ]; then
            echo "::error::Failing or cancelled jobs: $fail"
            exit 1
          fi
