name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Cargo fmt
        run: cargo fmt --all --check

      - name: Cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Install Python dev deps
        run: pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check py_src/ tests/

      - name: Ruff format check
        run: ruff format --check py_src/ tests/

      - name: Mypy
        run: mypy py_src/taskito/

  rust-test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Run Rust tests
        run: cargo test --workspace

  test:
    needs: [lint, rust-test]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
        include:
          - os: macos-latest
            python-version: "3.13"
          - os: macos-latest
            python-version: "3.9"
          - os: windows-latest
            python-version: "3.13"
          - os: windows-latest
            python-version: "3.9"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Create virtualenv (Unix)
        if: runner.os != 'Windows'
        run: |
          python -m venv .venv
          echo "${{ github.workspace }}/.venv/bin" >> $GITHUB_PATH
          echo "VIRTUAL_ENV=${{ github.workspace }}/.venv" >> $GITHUB_ENV

      - name: Create virtualenv (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m venv .venv
          echo "${{ github.workspace }}\.venv\Scripts" >> $env:GITHUB_PATH
          echo "VIRTUAL_ENV=${{ github.workspace }}\.venv" >> $env:GITHUB_ENV

      - name: Install maturin
        run: pip install maturin

      - name: Build and install
        run: |
          pip install -e ".[dev]"
          maturin develop --release

      - name: Run Python tests
        run: pytest tests/python/ -v

  build-wheels:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, macos-13, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Set OpenSSL dir (macOS)
        if: runner.os == 'macOS'
        run: echo "OPENSSL_DIR=$(brew --prefix openssl@3)" >> $GITHUB_ENV

      - name: Install OpenSSL (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install openssl -y --no-progress
          $opensslDir = (Get-Item "C:\Program Files\OpenSSL*").FullName
          echo "OPENSSL_DIR=$opensslDir" >> $env:GITHUB_ENV

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          args: --release --out dist --features postgres,redis
          manylinux: 2_28
          before-script-linux: dnf install -y openssl-devel perl-IPC-Cmd

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/*.whl
