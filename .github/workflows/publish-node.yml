name: Publish to npm

# Builds the napi addon as prebuilt per-platform `.node` binaries on native
# runners (no cross-compilation — the same approach the Python publish.yml uses
# for wheels), then publishes the per-platform `@byteveda/taskito-<triple>`
# packages plus the main `@byteveda/taskito` package to npm via OIDC trusted
# publishing + provenance. The npm scope sidesteps the spam-detection 403 that
# unscoped per-platform names trip on first publish.

on:
  push:
    tags:
      # Node releases use a `node-v` tag namespace, distinct from Python's `v*`.
      - "node-v[0-9]*.[0-9]*.[0-9]*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.16.3)"
        required: true
        type: string
      dry-run:
        description: "Build and assemble only — skip npm publish and tagging"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

# Force HTTP/1.1 + extra retries for cargo's crate downloader — the same flaky
# "HTTP2 framing layer" / "unexpected eof" failures CI hits also break a release
# build. See ci.yml for the full rationale.
env:
  CARGO_HTTP_MULTIPLEXING: "false"
  CARGO_NET_RETRY: "10"

jobs:
  preflight:
    name: Preflight checks
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      tag_exists: ${{ steps.tag.outputs.exists }}
    steps:
      - uses: actions/checkout@v7.0.1

      - name: Resolve version
        id: resolve
        env:
          VERSION_INPUT: ${{ inputs.version }}
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            version="${GITHUB_REF_NAME#node-v}"
          else
            version="${VERSION_INPUT#v}"
          fi
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format: ${version}"
            exit 1
          fi
          printf 'version=%s\n' "$version" >> "$GITHUB_OUTPUT"

      - name: Verify version matches package.json
        run: |
          version="${{ steps.resolve.outputs.version }}"
          pkg_ver=$(node -p "require('./sdks/node/package.json').version")
          if [ "$pkg_ver" != "$version" ]; then
            echo "::error::Resolved version ${version} != sdks/node/package.json ${pkg_ver}"
            exit 1
          fi

      # An existing tag at the current commit means a previous manual run got
      # past the tag push but failed later — treat it as a rerun and let the
      # publish job skip the push. A tag pointing elsewhere is a real conflict.
      - name: Check remote tag state
        id: tag
        if: github.event_name != 'push'
        run: |
          version="${{ steps.resolve.outputs.version }}"
          remote_sha="$(git ls-remote --tags origin "refs/tags/node-v${version}" | awk '{print $1}')"
          if [ -z "$remote_sha" ]; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
          elif [ "$remote_sha" = "$(git rev-parse HEAD)" ]; then
            echo "::notice::Tag node-v${version} already at this commit — treating as rerun"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Tag node-v${version} exists on remote at ${remote_sha}, not HEAD"
            exit 1
          fi

  build:
    name: Build ${{ matrix.triple }}
    needs: preflight
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # glibc builds run natively on the host runner: the napi cross image's
          # old-glibc sysroot (manylinux baseline) #defines strsep as a macro,
          # which collides with pq-src's libpq-18 headers. 22.04 keeps a low glibc
          # baseline (2.35). Only musl needs the Alpine container.
          - triple: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
          - triple: aarch64-unknown-linux-gnu
            runner: ubuntu-22.04-arm
          - triple: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-alpine
          - triple: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-alpine
          - triple: x86_64-apple-darwin
            runner: macos-15-intel
          - triple: aarch64-apple-darwin
            runner: macos-15
          - triple: x86_64-pc-windows-msvc
            runner: windows-latest
    steps:
      - uses: actions/checkout@v7.0.1

      # The postgres feature pulls openssl-sys (vendored), whose Configure runs
      # perl. Under bash the MSYS perl shadows the runner's Strawberry Perl and
      # lacks modules OpenSSL needs, so pin openssl-src to Strawberry Perl.
      - name: Point vendored OpenSSL at Strawberry Perl (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: echo "OPENSSL_SRC_PERL=C:/Strawberry/perl/bin/perl.exe" >> "$GITHUB_ENV"

      # macOS / Windows build natively on the runner.
      - name: Set up Rust
        if: matrix.docker == ''
        uses: ./.github/actions/setup-rust

      - name: Set up Node + pnpm
        if: matrix.docker == ''
        uses: ./.github/actions/setup-node

      - name: Build native addon (host target)
        if: matrix.docker == ''
        shell: bash
        working-directory: sdks/node
        run: pnpm run build:native

      # Linux builds run inside the napi-rs image for a low glibc / musl baseline.
      # Checkout and this `docker run` execute on the host runner — JavaScript
      # actions (checkout) can't run inside an Alpine container on arm64 runners,
      # so the job has no `container:` and shells into the image here instead.
      # perl is needed by vendored openssl-sys + pq-src (libpq) to build from source;
      # --force overwrites the pnpm the image preinstalls (otherwise EEXIST).
      - name: Build native addon in docker
        if: matrix.docker != ''
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/build" \
            -w /build/sdks/node \
            -e CARGO_HTTP_MULTIPLEXING \
            -e CARGO_NET_RETRY \
            "${{ matrix.docker }}" \
            sh -c '
              set -e
              if command -v apk >/dev/null; then
                apk add --no-cache perl build-base
              else
                apt-get update && apt-get install -y perl
              fi
              # The image ships an old Rust (1.82); some deps need edition2024.
              rustup update stable && rustup default stable
              npm install -g pnpm@10.33.0 --force
              pnpm install --frozen-lockfile
              pnpm run build:native
            '

      - name: Upload binding
        uses: actions/upload-artifact@v7
        with:
          name: bindings-${{ matrix.triple }}
          path: sdks/node/native/*.node
          if-no-files-found: error

      # The napi loader + its .d.ts are gitignored and generated by build:native.
      # They're identical across platforms, so upload them once for the publish
      # job to consume (it has no native build of its own).
      - name: Upload napi loader stubs
        if: matrix.triple == 'x86_64-unknown-linux-gnu'
        uses: actions/upload-artifact@v7
        with:
          name: napi-stubs
          path: |
            sdks/node/native/index.js
            sdks/node/native/index.d.ts
          if-no-files-found: error

  publish:
    name: Publish to npm
    needs: [preflight, build]
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: write # tag + release
      id-token: write # OIDC trusted publishing + provenance
    env:
      VERSION: ${{ needs.preflight.outputs.version }}
      TAG_EXISTS: ${{ needs.preflight.outputs.tag_exists }}
    steps:
      # Don't persist the write token in .git/config — npm/build steps don't
      # need git auth, and the only push (the tag) gets the token explicitly.
      - uses: actions/checkout@v7.0.1
        with:
          persist-credentials: false

      - name: Set up Node + pnpm
        uses: ./.github/actions/setup-node

      - name: Update npm (trusted publishing + provenance)
        run: npm install -g npm@latest

      - name: Build dashboard SPA
        uses: ./.github/actions/dashboard-build
        with:
          out-dir: ../sdks/node/static/dashboard

      # The napi loader stubs (gitignored) must exist before build:ts — native.ts
      # imports their types — and ship in the main package alongside dist/.
      - name: Download napi loader stubs
        uses: actions/download-artifact@v8
        with:
          name: napi-stubs
          path: sdks/node/native

      - name: Build TypeScript
        working-directory: sdks/node
        run: pnpm run build:ts

      - name: Download platform bindings
        uses: actions/download-artifact@v8
        with:
          pattern: bindings-*
          path: sdks/node/artifacts

      - name: Assemble per-platform npm packages
        working-directory: sdks/node
        run: |
          pnpm exec napi create-npm-dir -t .
          pnpm exec napi artifacts -d artifacts
          ls -R npm

      - name: Inject optionalDependencies into the main package
        working-directory: sdks/node
        run: |
          node <<'NODE'
          const fs = require("fs");
          const version = process.env.VERSION;
          const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
          pkg.optionalDependencies = {};
          for (const dir of fs.readdirSync("npm").sort()) {
            const name = JSON.parse(fs.readFileSync(`npm/${dir}/package.json`, "utf8")).name;
            pkg.optionalDependencies[name] = version;
          }
          fs.writeFileSync("package.json", `${JSON.stringify(pkg, null, 2)}\n`);
          console.log("optionalDependencies:", pkg.optionalDependencies);
          NODE

      # First publish only: npm has no OIDC path for a not-yet-existing package
      # (the trusted-publisher config can't be added until the package exists), so
      # authenticate this initial release with a token. Written right before the
      # publish steps and skipped on dry-runs to keep the token out of build/assembly.
      # Once trusted publishing is configured on every package, delete this step +
      # the NPM_TOKEN secret and publishing falls back to OIDC-only.
      - name: Configure npm auth (first publish — pre-OIDC)
        if: ${{ !inputs.dry-run }}
        run: npm config set //registry.npmjs.org/:_authToken "${NODE_AUTH_TOKEN}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish per-platform packages
        id: platforms
        if: ${{ !inputs.dry-run }}
        working-directory: sdks/node
        # Skip any package already live at this version so a rerun after a
        # partial publish can finish the rest. A single platform failing (e.g.
        # npm spam-detection 403) must NOT abort the run before the main package
        # publishes — the SDK still installs on every platform that did land.
        # Record failures and surface them at the end of the job instead.
        run: |
          failed=""
          for dir in npm/*/; do
            pkg=$(node -p "require('./${dir}package.json').name")
            if npm view "${pkg}@${VERSION}" version >/dev/null 2>&1; then
              echo "::notice::${pkg}@${VERSION} already published — skipping"
            elif npm publish "$dir" --provenance --access public; then
              echo "Published ${pkg}@${VERSION}"
            else
              echo "::warning::Failed to publish ${pkg}@${VERSION}"
              failed="${failed} ${pkg}"
            fi
          done
          echo "failed=${failed# }" >> "$GITHUB_OUTPUT"

      - name: Publish main package
        if: ${{ !inputs.dry-run }}
        working-directory: sdks/node
        run: |
          if npm view "@byteveda/taskito@${VERSION}" version >/dev/null 2>&1; then
            echo "::notice::@byteveda/taskito@${VERSION} already published — skipping"
          else
            npm publish --provenance --access public
          fi

      # Drop the token from npm config even if a publish step failed.
      - name: Clear npm auth
        if: ${{ always() && !inputs.dry-run }}
        run: npm config delete //registry.npmjs.org/:_authToken || true

      - name: Verify version on npm
        if: ${{ !inputs.dry-run }}
        run: |
          for _attempt in 1 2 3 4 5; do
            if npm view "@byteveda/taskito@${VERSION}" version >/dev/null 2>&1; then
              echo "@byteveda/taskito@${VERSION} live on npm"
              exit 0
            fi
            sleep 15
          done
          echo "::error::@byteveda/taskito@${VERSION} not found on npm"
          exit 1

      - name: Create git tag
        if: github.event_name != 'push' && !inputs.dry-run && env.TAG_EXISTS != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git tag "node-v${VERSION}"
          git -c http.https://github.com/.extraheader="AUTHORIZATION: bearer ${GH_TOKEN}" \
            push origin "node-v${VERSION}"

      - name: Create GitHub release
        if: ${{ !inputs.dry-run }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "node-v${VERSION}" >/dev/null 2>&1; then
            echo "::notice::Release node-v${VERSION} already exists — skipping"
          else
            gh release create "node-v${VERSION}" \
              --title "taskito (Node) v${VERSION}" \
              --generate-notes
          fi

      # The main package + tag + release are done; only now flag any platform
      # binary that didn't publish, so a missing target turns the job red for a
      # maintainer to chase without having blocked the otherwise-usable release.
      - name: Fail if any platform package was skipped
        if: ${{ always() && !inputs.dry-run && steps.platforms.outputs.failed != '' }}
        # Pass the list via env, not inline ${{ }} expansion, so a package name
        # can't break out of the shell script (template-injection defense).
        env:
          FAILED_PLATFORMS: ${{ steps.platforms.outputs.failed }}
        run: |
          echo "::error::Platform packages that did not publish: ${FAILED_PLATFORMS}"
          echo "::error::Install on those platforms will fail until they are republished."
          exit 1
