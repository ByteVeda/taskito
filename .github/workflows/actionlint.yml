name: Actionlint

on:
  push:
    branches: [master]
    paths:
      - ".github/workflows/**"
      - ".github/actionlint.yaml"
  pull_request:
    branches: [master]
    paths:
      - ".github/workflows/**"
      - ".github/actionlint.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      - name: Run actionlint
        uses: raven-actions/actionlint@v2
        with:
          matcher: true
