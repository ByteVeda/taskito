repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all --check
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --all-targets --all-features -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false

      - id: ruff-check
        name: ruff check (taskito + tests)
        entry: bash -c 'cd sdks/python && uv run ruff check taskito/ tests/'
        language: system
        types: [python]
        pass_filenames: false

      - id: ruff-format
        name: ruff format (taskito + tests)
        entry: bash -c 'cd sdks/python && uv run ruff format --check taskito/ tests/'
        language: system
        types: [python]
        pass_filenames: false

      - id: mypy
        name: mypy (taskito + tests)
        entry: bash -c 'cd sdks/python && uv run mypy taskito/ tests/ --no-incremental'
        language: system
        types: [python]
        pass_filenames: false

      - id: node-lint
        name: node lint (biome)
        entry: bash -c 'cd sdks/node && pnpm exec biome ci src test'
        language: system
        files: ^sdks/node/(src/|test/|biome\.json)
        pass_filenames: false

      - id: node-typecheck
        name: node typecheck (tsc)
        entry: bash -c 'cd sdks/node && pnpm exec tsc --noEmit -p tsconfig.json'
        language: system
        files: ^sdks/node/(src/|test/|tsconfig\.json|package\.json)
        pass_filenames: false

      - id: dashboard-lint
        name: dashboard lint (biome)
        entry: bash -c 'cd dashboard && pnpm exec biome ci src/'
        language: system
        files: ^dashboard/src/
        pass_filenames: false

      - id: dashboard-typecheck
        name: dashboard typecheck
        entry: bash -c 'cd dashboard && pnpm exec tsc --noEmit'
        language: system
        files: ^dashboard/(src/|tsconfig\.json|package\.json)
        pass_filenames: false

      - id: dashboard-test
        name: dashboard tests (vitest)
        entry: bash -c 'cd dashboard && pnpm exec vitest run'
        language: system
        files: ^dashboard/src/
        pass_filenames: false

      - id: docs-lint
        name: docs lint (biome)
        entry: bash -c 'cd docs && pnpm exec biome ci app/'
        language: system
        files: ^docs/(app/|biome\.json)
        pass_filenames: false

      - id: docs-typecheck
        name: docs typecheck (react-router typegen + tsc)
        entry: bash -c 'cd docs && pnpm run typecheck'
        language: system
        files: ^docs/(app/|tsconfig\.json|package\.json)
        pass_filenames: false
