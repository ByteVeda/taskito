[package]
name = "taskito-python"
version = "0.2.3"
edition = "2021"

[features]
default = []
postgres = ["taskito-core/postgres"]

[lib]
name = "_taskito"
crate-type = ["cdylib"]

[dependencies]
taskito-core = { path = "../taskito-core" }
pyo3 = { workspace = true }
tokio = { workspace = true }
crossbeam-channel = { workspace = true }
uuid = { workspace = true }
